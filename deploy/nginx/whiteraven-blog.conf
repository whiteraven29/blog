server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    access_log /var/www/logs/whiteraven-blog/nginx-access.log;
    error_log /var/www/logs/whiteraven-blog/nginx-error.log warn;

    root /var/www/apps/whiteraven-blog/current/frontend/dist;
    index index.html;

    client_max_body_size 12m;

    location /api/ {
        proxy_pass http://unix:/var/www/tmp/whiteraven-blog/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://unix:/var/www/tmp/whiteraven-blog/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/shared/whiteraven-blog/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/shared/whiteraven-blog/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
